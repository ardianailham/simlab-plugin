name: Plugin Compatibility Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: PHP Lint (Syntax Check Only, No DB)
  # ─────────────────────────────────────────────
  php-lint:
    name: PHP Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Check PHP syntax on all plugin files
        run: |
          find . -name "*.php" \
            ! -path "./.git/*" \
            ! -path "./tests/*" \
            ! -path "./vendor/*" \
            -print0 | xargs -0 -n1 php -l

  # ─────────────────────────────────────────────
  # JOB 2: WordPress Integration Tests (with DB)
  # ─────────────────────────────────────────────
  wp-tests:
    name: WP ${{ matrix.wp }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
        wp:
          - 'latest'
          - '6.5'
          - '6.4'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wp_user
          MYSQL_PASSWORD: wp_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, pdo_mysql
          tools: phpunit
          coverage: none

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -u"wp_user" -p"wp_password" 2>/dev/null; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL failed to start"
          exit 1

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction

      - name: Install WordPress test suite
        run: |
          bash bin/install-wp-tests.sh \
            wordpress_test wp_user wp_password 127.0.0.1 ${{ matrix.wp }}
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Run PHPUnit tests
        run: phpunit --configuration phpunit.xml.dist
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306